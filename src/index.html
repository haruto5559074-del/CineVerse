<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>CineVerse — Movies, Series &amp; Dramas Suggestor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        function isBadge(el) {
          if (!el || el.nodeType !== 1) return false;
          if (el.id === "root" || el.tagName === "SCRIPT" || el.tagName === "STYLE") return false;
          var text = (el.textContent || "").toLowerCase();
          var href = "";
          var link = el.tagName === "A" ? el : el.querySelector && el.querySelector("a");
          if (link) href = (link.getAttribute("href") || "").toLowerCase();
          return (
            text.indexOf("built with") !== -1 ||
            text.indexOf("arena") !== -1 ||
            href.indexOf("arena") !== -1
          );
        }
        function sweep() {
          var nodes = document.body.children;
          for (var i = nodes.length - 1; i >= 0; i--) {
            var el = nodes[i];
            if (el.id === "root" || el.tagName === "SCRIPT" || el.tagName === "STYLE") continue;
            if (isBadge(el)) el.remove();
          }
        }
        var observer = new MutationObserver(sweep);
        observer.observe(document.body, { childList: true, subtree: false });
        sweep();
        setInterval(sweep, 1500);
      })();
    </script>
  </body>
</html>
